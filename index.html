<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek 使用量图表</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>DeepSeek 用量与费用</h1>
    <p>上传从 DeepSeek 官网下载的月度用量 ZIP 文件</p>
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题"></button>
  </header>

  <div id="dropZone" class="drop-zone">
    <div class="icon">📊</div>
    <div class="text">点击选择文件或拖拽 ZIP 到此处</div>
    <div class="hint">从 DeepSeek 官网 → 用量明细 → 导出记录 下载的 .zip 文件</div>
    <div class="file-name" id="fileName"></div>
  </div>

  <div class="error" id="error"></div>
  <div class="loading" id="loading">解析数据中...</div>

  <div id="content" style="display:none;">
    <div class="filter-bar" id="filterBar" style="display:none;">
      <div class="filter-row">
        <span class="filter-label">Key:</span>
        <div class="filter-keys" id="filterKeys"></div>
        <button class="filter-btn filter-btn-dim" id="btnClear">清空</button>
        <button class="filter-btn" id="btnSelectAll">全选</button>
      </div>
      <div class="filter-row" id="modelFilterRow">
        <span class="filter-label">模型:</span>
        <div class="filter-keys" id="filterModels"></div>
        <button class="filter-btn filter-btn-dim" id="btnClearModels">清空</button>
        <button class="filter-btn" id="btnSelectAllModels">全选</button>
      </div>
      <div class="filter-row" id="dateFilterRow">
        <span class="filter-label">时间:</span>
        <input type="date" id="dateMin">
        <span class="filter-label">~</span>
        <input type="date" id="dateMax">
      </div>
    </div>

    <div class="table-card" id="keyTableWrap" style="display:none;">
      <h2>明细数据</h2>
      <div class="table-scroll">
        <table id="keyTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="charts">
      <div class="chart-card">
        <h2>每日费用（按模型）</h2>
        <div class="chart-wrap"><div id="dailyCostChart"></div></div>
      </div>
      <div class="chart-card">
        <h2>Token 用量分布</h2>
        <div class="chart-wrap"><div id="tokenTypeChart"></div></div>
      </div>
      <div class="chart-card chart-full">
        <h2>每日 Token 用量趋势</h2>
        <div class="chart-wrap"><div id="dailyTokenChart"></div></div>
      </div>
      <div class="chart-card">
        <h2>API Key 费用对比</h2>
        <div class="chart-wrap"><div id="keyCostChart"></div></div>
      </div>
      <div class="chart-card">
        <h2>API Key Token 用量</h2>
        <div class="chart-wrap"><div id="keyTokenChart"></div></div>
      </div>
    </div>
  </div>

  <footer>
    数据仅在浏览器本地处理，不会上传到任何服务器
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<script src="app.js"></script>
</body>
</html>
